<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live News Board</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Outfit;
background:#ececec;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
background:white;
border-bottom:4px solid black;
padding:15px;
text-align:center;
font-size:26px;
font-weight:900;
}

/* CHAT */

.chat-box{
background:white;
border-radius:10px;
padding:10px;
margin-top:15px;
height:420px;
overflow-y:auto;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
}

/* OTHER USER */

.msg{
max-width:75%;
padding:10px;
margin:5px 0;
border-radius:10px;
background:#f1f2f6;
align-self:flex-start;
}

/* MY MESSAGE */

.mymsg{
max-width:75%;
padding:10px;
margin:5px 0;
border-radius:10px;
background:#2ecc71;
color:white;
align-self:flex-end;
}

.time{
font-size:11px;
margin-top:4px;
opacity:.8;
}

.input-box{
margin-top:10px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

.row{
display:flex;
gap:5px;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.send{
background:black;
color:white;
flex:1;
}

.login{
background:black;
color:white;
width:100%;
}

/* FLOAT BUTTONS */

.float-btn{
position:fixed;
right:15px;
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.rcm-btn{
bottom:90px;
background:#2ecc71;
color:white;
}

.lock-btn{
bottom:30px;
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div id="loginPage">

<div class="header">📰 LIVE NEWS BOARD</div>

<div class="input-box">

<input type="password" id="code" placeholder="Enter Code">

<button class="login" onclick="login()">Open Board</button>

</div>

</div>


<div id="chatPage" style="display:none">

<div class="header">📰 LIVE NEWS BOARD</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">

<div class="row">
<input type="text" id="msg" placeholder="Write news...">
<button class="send" onclick="send()">Publish</button>
</div>

</div>

</div>

</div>

<button class="float-btn rcm-btn" onclick="openRCM()">🌐</button>
<button class="float-btn lock-btn" onclick="lockChat()">🔒</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getDatabase,
ref,
push,
onChildAdded,
onChildRemoved,
get,
remove
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyCoNO0Ykevb3whEaiwSYAkRGtjTEjJslnU",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13",
storageBucket: "dschat-18c13.firebasestorage.app",
messagingSenderId: "846109078144",
appId: "1:846109078144:web:ab8cca30cfa40cbbab6c65"
};

const app = initializeApp(firebaseConfig);

const db=getDatabase(app);

const chatRef=ref(db,"news");


/* USER ID */

let userId=localStorage.getItem("userId");

if(!userId){

userId="u"+Math.floor(Math.random()*100000);

localStorage.setItem("userId",userId);

}


/* LOGIN */

window.login=function(){

let code=document.getElementById("code").value;

if(code=="0911"){

document.getElementById("loginPage").style.display="none";
document.getElementById("chatPage").style.display="block";

}else{

alert("Wrong Code");

}

}


/* SEND */

window.send=function(){

let msg=document.getElementById("msg").value;

if(msg=="") return;

push(chatRef,{
text:msg,
user:userId,
time:Date.now()
});

document.getElementById("msg").value="";

}


/* MESSAGE LISTENER */

onChildAdded(chatRef,(data)=>{

let d=data.val();

let time=new Date(d.time).toLocaleTimeString();

let cls=(d.user==userId)?"mymsg":"msg";

let div=document.createElement("div");

div.className=cls;

div.id=data.key;

div.innerHTML=`
${d.text}
<div class="time">${time}</div>
`;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

});


/* REMOVE MESSAGE */

onChildRemoved(chatRef,(data)=>{

let el=document.getElementById(data.key);

if(el) el.remove();

});


/* AUTO DELETE SYSTEM */

setInterval(async()=>{

const snapshot=await get(chatRef);

snapshot.forEach(child=>{

let data=child.val();

if(Date.now()-data.time>15000){

remove(child.ref);

}

});

},5000);


/* BUTTONS */

window.openRCM=function(){

window.location.href="https://www.rcmworld.com";

}

window.lockChat=function(){

document.getElementById("chatPage").style.display="none";

document.getElementById("loginPage").style.display="block";

}

</script>

</body>
</html>
