<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Outfit;background:#fff}

/* RCM */
#rcmSite{position:fixed;top:0;left:0;width:100%;height:100vh;border:none;z-index:1}

/* DOT */
#secretZone{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:60px;height:30px;z-index:2;display:flex;justify-content:center;align-items:center}
#secretZone::after{content:'';width:6px;height:6px;background:#aaa;border-radius:50%;opacity:0.4}

/* CODE */
#codeBox{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;padding:10px;border-radius:10px;display:none;z-index:5;border:1px solid #ddd}
#codeInput{width:120px;padding:8px;border:1px solid #ccc;text-align:center}

/* CHAT */
.container{display:none;max-width:500px;margin:auto;background:#fff}
.header{padding:12px;display:flex;justify-content:space-between;border-bottom:1px solid #eee;font-weight:bold}

.chat-box{
height:420px;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column-reverse;
}

/* TEXT STYLE */
.msg,.mymsg{padding:8px 0;border-bottom:1px solid #f1f1f1}
.mymsg{text-align:right}

.name{font-size:11px;color:#999}
.text{font-size:15px}
.time{font-size:10px;color:#aaa}

.status{font-size:10px;margin-left:5px}
.delivered{color:#2563eb}
.read{color:#16a34a}

/* typing */
.typing{font-size:12px;color:#888;margin:5px}

/* INPUT */
.input-box{padding:10px;border-top:1px solid #eee}
.row{display:flex;gap:5px}
input{width:100%;padding:10px;border:1px solid #ccc}
.send{padding:10px;background:black;color:white;border:none}
</style>
</head>

<body>

<iframe id="rcmSite" src="https://www.rcmworld.com"></iframe>

<div id="secretZone"></div>

<div id="codeBox">
<input type="password" id="codeInput" placeholder="••••">
</div>

<div class="container">

<div class="header">
<div id="userName"></div>
<div>
<button onclick="clearChat()">🧹</button>
<button onclick="lockChat()">🔒</button>
</div>
</div>

<div class="chat-box" id="chat"></div>

<div id="typing" class="typing" style="display:none">typing...</div>

<div class="input-box">
<div class="row">
<input type="text" id="msg">
<button class="send" onclick="send()">Add</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, update, remove, set, onValue } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyYOUR_KEY",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const chatRef=ref(db,"news");
const typingRef=ref(db,"typing");

/* USER */
let userName = localStorage.getItem("chatUser") || "";
document.getElementById("userName").innerText=userName;

/* SEND */
window.send=function(){
let msg=document.getElementById("msg").value;
if(msg=="") return;

push(chatRef,{
text:msg,
user:userName,
time:Date.now(),
delivered:false,
seen:false
});

document.getElementById("msg").value="";
}

/* RECEIVE */
let chat=document.getElementById("chat");

onChildAdded(chatRef,(data)=>{

let d=data.val();
let time=new Date(d.time).toLocaleTimeString();

let myUser = localStorage.getItem("chatUser");
let isMe = d.user===myUser;
let cls = isMe ? "mymsg" : "msg";

/* STATUS */
let status="✔";
let statusClass="";

if(d.delivered){
status="✔✔";
statusClass="delivered";
}
if(d.seen){
status="✔✔";
statusClass="read";
}

let div=document.createElement("div");
div.className=cls;

div.innerHTML=`
<div class="name">${d.user}</div>
<div class="text">${d.text}</div>
<div class="time">
${time}
${isMe ? `<span class="status ${statusClass}">${status}</span>`:""}
</div>
`;

chat.prepend(div);

/* delivered */
if(!isMe && !d.delivered){
update(data.ref,{delivered:true});
}

/* read */
if(!isMe && !d.seen){
setTimeout(()=>{
update(data.ref,{seen:true});
},1000);
}

});

/* TYPING */
let inputBox=document.getElementById("msg");

inputBox.addEventListener("input",()=>{
set(ref(db,"typing/"+userName),true);

setTimeout(()=>{
remove(ref(db,"typing/"+userName));
},2000);
});

onValue(typingRef,(snap)=>{
let data=snap.val();

if(data && !data[userName]){
document.getElementById("typing").style.display="block";
}else{
document.getElementById("typing").style.display="none";
}
});

/* CLEAR */
window.clearChat=function(){
if(confirm("Clear?")){
remove(chatRef);
chat.innerHTML="";
}
}

/* LOCK */
window.lockChat=function(){
location.reload();
}

/* 5 TAP */
let tapCount=0,lastTap=0;
let zone=document.getElementById("secretZone");

zone.addEventListener("click",()=>{
let now=Date.now();
tapCount=(now-lastTap<500)?tapCount+1:1;
lastTap=now;

if(tapCount===5){
document.getElementById("codeBox").style.display="block";
document.getElementById("codeInput").focus();
tapCount=0;
}
});

/* CODE */
let codeInput=document.getElementById("codeInput");

codeInput.addEventListener("keyup",(e)=>{
if(e.key==="Enter"){

let code=codeInput.value;

if(code==="2709"){
localStorage.setItem("chatUser","P");
openChat();
}
else if(code==="1108"){
localStorage.setItem("chatUser","J");
openChat();
}else{
codeInput.value="";
}

}
});

function openChat(){
let user=localStorage.getItem("chatUser");
document.getElementById("userName").innerText=user;

document.getElementById("rcmSite").style.display="none";
document.getElementById("secretZone").style.display="none";
document.getElementById("codeBox").style.display="none";
document.querySelector(".container").style.display="block";
}

</script>

</body>
</html>
