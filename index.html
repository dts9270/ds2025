<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RCM WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Outfit;
background:#ececec;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
background:white;
padding:12px;
border-bottom:4px solid black;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:20px;
font-weight:900;
}

.top-btn{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin-left:5px;
}

.rcm{background:#2ecc71;color:white;}
.lock{background:#e74c3c;color:white;}
.clear{background:#f39c12;color:white;}

.chat-box{
background:white;
border-radius:10px;
padding:10px;
margin-top:10px;
height:420px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
background:white;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:75%;
align-self:flex-start;
}

.mymsg{
background:#e8f8f5;
border:1px solid #ccc;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:75%;
align-self:flex-end;
}

.time{
font-size:11px;
margin-top:3px;
opacity:.8;
}

.status{
font-size:10px;
padding:2px 6px;
border-radius:4px;
margin-left:6px;
color:white;
}

.delivered{background:orange;}
.read{background:#27ae60;}

.input-box{
background:white;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.row{
display:flex;
gap:5px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.send{background:black;color:white;}

.typing{
font-size:12px;
color:#666;
margin-top:5px;
}

.date-sep{
text-align:center;
font-size:12px;
margin:10px;
color:#666;
}

</style>
</head>

<body>

<audio id="msgSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3">
</audio>

<div class="container">

<div class="header">

<div class="title">RCM WORLD</div>

<div>
<button class="top-btn rcm" onclick="openRCM()">🌐 RCM</button>
<button class="top-btn lock" onclick="lockChat()">🔒</button>
<button class="top-btn clear" onclick="clearChat()">🧹</button>
</div>

</div>

<div class="chat-box" id="chat"></div>

<div id="typing" class="typing" style="display:none">
Someone is typing...
</div>

<div class="input-box">

<div class="row">
<input type="text" id="msg" placeholder="Message">
<button class="send" onclick="send()">Send</button>
</div>

<label style="font-size:12px">
Auto Delete
<input type="checkbox" id="autoDeleteToggle">
</label>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded,
onValue,
set,
onDisconnect,
update,
remove
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCoNO0Ykevb3whEaiwSYAkRGtjTEjJslnU",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13",
storageBucket: "dschat-18c13.appspot.com",
messagingSenderId: "846109078144",
appId: "1:846109078144:web:ab8cca30cfa40cbbab6c65"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const chatRef=ref(db,"news");
const typingRef=ref(db,"typing");

/* USER */

let userId=localStorage.getItem("userId");

if(!userId){
userId="u"+Math.floor(Math.random()*100000);
localStorage.setItem("userId",userId);
}

/* SEND */

window.send=function(){

let msg=document.getElementById("msg").value;

if(msg=="") return;

let newMsg=push(chatRef,{
text:msg,
user:userId,
time:Date.now(),
seen:false
});

if(document.getElementById("autoDeleteToggle").checked){

setTimeout(()=>{
remove(newMsg);
},30000);

}

document.getElementById("msg").value="";

}

/* MESSAGE LISTENER */

let chat=document.getElementById("chat");
let lastDate="";

onChildAdded(chatRef,(data)=>{

let d=data.val();

let date=new Date(d.time).toDateString();

if(lastDate!==date){

let sep=document.createElement("div");
sep.className="date-sep";
sep.innerText=date;
chat.appendChild(sep);

lastDate=date;

}

let time=new Date(d.time).toLocaleTimeString();

let cls=(d.user==userId)?"mymsg":"msg";

let statusClass=d.seen?"read":"delivered";
let statusText=d.seen?"Read":"Delivered";

let div=document.createElement("div");

div.className=cls;

div.innerHTML=`
${d.text}
<div class="time">
${time}
<span class="status ${statusClass}">
${statusText}
</span>
</div>
`;

chat.appendChild(div);

setTimeout(()=>{
chat.scrollTop=chat.scrollHeight;
},100);

update(data.ref,{seen:true});

if(d.user!==userId){
document.getElementById("msgSound").play();
}

});

/* TYPING */

let msgInput=document.getElementById("msg");

msgInput.addEventListener("input",()=>{

set(ref(db,"typing/"+userId),true);

setTimeout(()=>{
remove(ref(db,"typing/"+userId));
},2000);

});

onValue(typingRef,(snap)=>{

let typingUsers=snap.val();

if(!typingUsers){
document.getElementById("typing").style.display="none";
return;
}

let users=Object.keys(typingUsers);

if(users.length>0 && !typingUsers[userId]){
document.getElementById("typing").style.display="block";
}else{
document.getElementById("typing").style.display="none";
}

});

/* BUTTONS */

window.openRCM=function(){
window.location.replace("https://www.rcmworld.com");
}

window.lockChat=function(){
location.reload();
}

window.clearChat=async function(){

if(confirm("Delete all messages?")){
await remove(ref(db,"news"));
chat.innerHTML="";
}

}

</script>

</body>
</html>
