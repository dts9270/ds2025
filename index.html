<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Live Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Outfit;
background:#dfe6e9;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
background:linear-gradient(-45deg,#ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);
background-size:600% 600%;
animation:rainbow 8s infinite;
padding:20px;
border-radius:18px;
color:white;
text-align:center;
font-weight:800;
font-size:22px;
}

@keyframes rainbow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.chat-box{
background:white;
border-radius:15px;
padding:10px;
margin-top:15px;
height:420px;
overflow-y:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.msg{
padding:10px;
border-radius:10px;
margin-bottom:10px;
background:#f1f2f6;
}

.name{
font-weight:800;
font-size:13px;
color:#2d3436;
}

.text{
font-size:15px;
margin-top:3px;
}

.time{
font-size:11px;
color:#636e72;
margin-top:2px;
}

.input-box{
margin-top:10px;
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:8px;
border-radius:10px;
border:1px solid #ccc;
font-family:Outfit;
}

.row{
display:flex;
gap:5px;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.send{
background:#2d3436;
color:white;
flex:1;
}

.mic{
width:50px;
background:#ff7675;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
💬 DS Live Chat
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">

<input type="text" id="name" placeholder="तुमचे नाव">

<div class="row">
<input type="text" id="msg" placeholder="Message...">
<button class="mic" onclick="voice()">🎤</button>
<button class="send" onclick="send()">Send</button>
</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCoNO0Ykevb3whEaiwSYAkRGtjTEjJslnU",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13",
storageBucket: "dschat-18c13.firebasestorage.app",
messagingSenderId: "846109078144",
appId: "1:846109078144:web:ab8cca30cfa40cbbab6c65"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatRef = ref(db,"messages");

window.send = function(){

let name=document.getElementById("name").value;
let msg=document.getElementById("msg").value;

if(name==""||msg==""){
alert("Name आणि Message लिहा");
return;
}

push(chatRef,{
name:name,
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";

}

onChildAdded(chatRef,(data)=>{

let d=data.val();

let time=new Date(d.time).toLocaleTimeString();

let html=`
<div class="msg">
<div class="name">👤 ${d.name}</div>
<div class="text">${d.text}</div>
<div class="time">${time}</div>
</div>
`;

document.getElementById("chat").innerHTML+=html;

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

});

window.voice=function(){

if(!('webkitSpeechRecognition' in window)){
alert("Voice support नाही");
return;
}

let rec=new webkitSpeechRecognition();
rec.lang="mr-IN";

rec.start();

rec.onresult=(e)=>{
document.getElementById("msg").value=
e.results[0][0].transcript;
}

}

</script>

</body>
</html>
