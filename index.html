<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RCM Team Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Outfit;
background:#ececec;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
background:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:900;
border-bottom:4px solid black;
}

.online{
font-size:12px;
color:green;
}

.chat-box{
background:white;
border-radius:10px;
padding:10px;
margin-top:10px;
height:420px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
background:#f1f2f6;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:75%;
align-self:flex-start;
}

.mymsg{
background:#2ecc71;
color:white;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:75%;
align-self:flex-end;
}

.time{
font-size:11px;
opacity:.7;
margin-top:3px;
}

.input-box{
background:white;
padding:10px;
border-radius:10px;
margin-top:10px;
margin-bottom:80px;
}

.row{
display:flex;
gap:5px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.send{
background:black;
color:white;
}

.login{
background:black;
color:white;
width:100%;
}

.float-btn{
position:fixed;
right:15px;
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
cursor:pointer;
}

.rcm-btn{
bottom:150px;
background:#2ecc71;
color:white;
}

.lock-btn{
bottom:90px;
background:#e74c3c;
color:white;
}

img{
max-width:200px;
border-radius:10px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<div id="loginPage">

<div class="header">RCM TEAM CHAT</div>

<div class="input-box">

<input type="password" id="code" placeholder="Enter Code">

<button class="login" onclick="login()">Open Chat</button>

</div>

</div>

<div id="chatPage" style="display:none">

<div class="header">
RCM TEAM CHAT
<div class="online" id="onlineCount">🟢 0 Online</div>
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">

<label style="font-size:12px">
Auto Delete 30 sec
<input type="checkbox" id="autoSwitch" checked>
</label>

<div class="row">
<input type="text" id="msg" placeholder="Message">
<input type="file" id="imgInput">
<button class="send" onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<button class="float-btn rcm-btn" onclick="openRCM()">🌐</button>
<button class="float-btn lock-btn" onclick="lockChat()">🔒</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded,
onChildRemoved,
onValue,
set,
onDisconnect,
update,
get,
remove
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import {
getStorage,
ref as sRef,
uploadBytes,
getDownloadURL
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyCoNO0Ykevb3whEaiwSYAkRGtjTEjJslnU",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13",
storageBucket: "dschat-18c13.appspot.com",
messagingSenderId: "846109078144",
appId: "1:846109078144:web:ab8cca30cfa40cbbab6c65"
};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const storage=getStorage(app);

const chatRef=ref(db,"news");

/* USER ID */

let userId=localStorage.getItem("userId");

if(!userId){

userId="u"+Math.floor(Math.random()*100000);

localStorage.setItem("userId",userId);

}

/* ONLINE USERS */

const onlineRef=ref(db,"online/"+userId);

set(onlineRef,true);

onDisconnect(onlineRef).remove();

onValue(ref(db,"online"),(snap)=>{

let count=snap.size||0;

document.getElementById("onlineCount").innerText="🟢 "+count+" Online";

});

/* LOGIN */

window.login=function(){

let code=document.getElementById("code").value;

if(code=="0911"){

document.getElementById("loginPage").style.display="none";

document.getElementById("chatPage").style.display="block";

}else{

alert("Wrong Code");

}

}

/* SEND */

window.send=async function(){

let msg=document.getElementById("msg").value;

let file=document.getElementById("imgInput").files[0];

let autoSwitch=document.getElementById("autoSwitch").checked;

let ttl=autoSwitch?30000:600000;

let imageUrl=null;

if(file){

let imgRef=sRef(storage,"images/"+Date.now());

await uploadBytes(imgRef,file);

imageUrl=await getDownloadURL(imgRef);

}

if(msg=="" && !imageUrl) return;

push(chatRef,{
text:msg,
image:imageUrl,
user:userId,
time:Date.now(),
ttl:ttl,
delivered:true,
seen:false
});

document.getElementById("msg").value="";
document.getElementById("imgInput").value="";

}

/* MESSAGE LISTENER */

onChildAdded(chatRef,(data)=>{

let d=data.val();

let cls=(d.user==userId)?"mymsg":"msg";

let time=new Date(d.time).toLocaleTimeString();

let status="";

if(d.user==userId){

status=d.seen?"✓✓":"✓";

}

let div=document.createElement("div");

div.className=cls;

div.id=data.key;

div.innerHTML=`

${d.text||""}

${d.image?`<img src="${d.image}">`:""}

<div class="time">${time} ${status}</div>

`;

document.getElementById("chat").appendChild(div);

update(data.ref,{seen:true});

});

/* REMOVE */

onChildRemoved(chatRef,(data)=>{

let el=document.getElementById(data.key);

if(el) el.remove();

});

/* AUTO DELETE SYSTEM */

setInterval(async()=>{

const snapshot=await get(chatRef);

snapshot.forEach(child=>{

let data=child.val();

let ttl=data.ttl||30000;

if(Date.now()-data.time>ttl){

remove(child.ref);

}

});

},5000);

/* BUTTONS */

window.openRCM=function(){

window.location.href="https://www.rcmworld.com";

}

window.lockChat=function(){

document.getElementById("chatPage").style.display="none";

document.getElementById("loginPage").style.display="block";

}

</script>

</body>
</html>
