<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News Board</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Outfit;
background:#ececec;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
background:white;
border-bottom:4px solid black;
padding:15px;
text-align:center;
font-size:26px;
font-weight:900;
letter-spacing:2px;
}

.chat-box{
background:white;
border-radius:10px;
padding:10px;
margin-top:15px;
height:420px;
overflow-y:auto;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.msg{
border-bottom:1px dashed #bbb;
padding:10px 5px;
font-size:16px;
}

.time{
font-size:11px;
color:gray;
}

.input-box{
margin-top:10px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
font-family:Outfit;
}

.row{
display:flex;
gap:5px;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.send{
background:black;
color:white;
flex:1;
}

.login{
background:black;
color:white;
width:100%;
}

/* FLOAT BUTTONS */

.float-btn{
position:fixed;
right:15px;
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.rcm-btn{
bottom:90px;
background:#2ecc71;
color:white;
}

.lock-btn{
bottom:30px;
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div id="loginPage">

<div class="header">📰 LIVE NEWS BOARD</div>

<div class="input-box">

<input type="password" id="code" placeholder="Enter Code">

<button class="login" onclick="login()">Open Board</button>

</div>

</div>


<div id="chatPage" style="display:none">

<div class="header">
📰 LIVE NEWS BOARD
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">

<div class="row">
<input type="text" id="msg" placeholder="Write news...">
<button class="send" onclick="send()">Publish</button>
</div>

</div>

</div>

</div>


<button class="float-btn rcm-btn" onclick="openRCM()">🌐</button>
<button class="float-btn lock-btn" onclick="lockChat()">🔒</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCoNO0Ykevb3whEaiwSYAkRGtjTEjJslnU",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13",
storageBucket: "dschat-18c13.firebasestorage.app",
messagingSenderId: "846109078144",
appId: "1:846109078144:web:ab8cca30cfa40cbbab6c65"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatRef = ref(db,"news");


window.login=function(){

let code=document.getElementById("code").value;

if(code=="0911"){

document.getElementById("loginPage").style.display="none";
document.getElementById("chatPage").style.display="block";

}else{

alert("Wrong Code");

}

}


window.send=function(){

let msg=document.getElementById("msg").value;

if(msg=="") return;

let newMsg = push(chatRef,{
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";


/* AUTO DELETE 15 SEC */

setTimeout(()=>{
remove(newMsg)
},15000);

}


onChildAdded(chatRef,(data)=>{

let d=data.val();

let time=new Date(d.time).toLocaleTimeString();

let html=`
<div class="msg">
${d.text}
<div class="time">${time}</div>
</div>
`;

document.getElementById("chat").innerHTML+=html;

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

});


window.openRCM=function(){

window.open("https://www.rcmworld.com","_blank")

}

window.lockChat=function(){

document.getElementById("chatPage").style.display="none"
document.getElementById("loginPage").style.display="block"

}

</script>

</body>
</html>
