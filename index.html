<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Outfit;
background:#fff;
}

/* RCM */
#rcmSite{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
border:none;
z-index:1;
}

/* SECRET DOT */
#secretZone{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
width:60px;
height:30px;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
}
#secretZone::after{
content:'';
width:6px;
height:6px;
background:#aaa;
border-radius:50%;
opacity:0.4;
}

/* CODE BOX */
#codeBox{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:10px;
border-radius:10px;
display:none;
z-index:5;
border:1px solid #ddd;
}
#codeInput{
width:120px;
padding:8px;
border:1px solid #ccc;
text-align:center;
}

/* CONTAINER */
.container{
display:none;
max-width:500px;
margin:auto;
background:#fff;
}

/* HEADER */
.header{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
font-weight:bold;
}

/* NOTES STYLE */
.chat-box{
height:420px;
overflow-y:auto;
padding:10px;
}

/* MESSAGE STYLE */
.msg, .mymsg{
padding:8px 0;
border-bottom:1px solid #f1f1f1;
}

.mymsg{
text-align:right;
}

/* USER NAME */
.name{
font-size:11px;
color:#999;
}

/* TEXT */
.text{
font-size:15px;
color:#111;
}

/* INPUT */
.input-box{
padding:10px;
border-top:1px solid #eee;
}
.row{
display:flex;
gap:5px;
}
input{
width:100%;
padding:10px;
border:1px solid #ccc;
}
.send{
padding:10px;
background:#111;
color:white;
border:none;
}
</style>
</head>

<body>

<!-- RCM -->
<iframe id="rcmSite" src="https://www.rcmworld.com"></iframe>

<!-- DOT -->
<div id="secretZone"></div>

<!-- CODE BOX -->
<div id="codeBox">
<input type="password" id="codeInput" placeholder="••••">
</div>

<!-- HIDDEN CHAT -->
<div class="container">

<div class="header">
<div id="userName"></div>
<button onclick="lockChat()">🔒</button>
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">
<div class="row">
<input type="text" id="msg" placeholder="Enter">
<button class="send" onclick="send()">Add</button>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyYOUR_KEY",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const chatRef=ref(db,"news");

/* USER */
let userName = localStorage.getItem("chatUser") || "";
document.getElementById("userName").innerText = userName;

/* SEND */
window.send=function(){
let msg=document.getElementById("msg").value;
if(msg=="") return;

push(chatRef,{
text:msg,
user:userName,
time:Date.now()
});

document.getElementById("msg").value="";
}

/* RECEIVE */
let chat=document.getElementById("chat");

onChildAdded(chatRef,(data)=>{

let d=data.val();
let myUser = localStorage.getItem("chatUser");
let cls = (d.user===myUser) ? "mymsg" : "msg";

let div=document.createElement("div");
div.className=cls;

div.innerHTML=`
<div class="name">${d.user}</div>
<div class="text">${d.text}</div>
`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

});

/* LOCK */
window.lockChat=function(){
location.reload();
}

/* 5 TAP */
let tapCount=0;
let lastTap=0;
let zone=document.getElementById("secretZone");

zone.addEventListener("click",()=>{

let now=Date.now();

if(now - lastTap < 500){
tapCount++;
}else{
tapCount=1;
}

lastTap=now;

if(tapCount===5){
document.getElementById("codeBox").style.display="block";
document.getElementById("codeInput").focus();
tapCount=0;
}

});

/* CODE */
let input=document.getElementById("codeInput");

input.addEventListener("keyup",(e)=>{

if(e.key==="Enter"){

let code=input.value;

if(code==="2709"){
localStorage.setItem("chatUser","P");
openChat();
}
else if(code==="1108"){
localStorage.setItem("chatUser","J");
openChat();
}
else{
input.value="";
}

}

});

function openChat(){
let user = localStorage.getItem("chatUser");
document.getElementById("userName").innerText = user;

document.getElementById("rcmSite").style.display="none";
document.getElementById("secretZone").style.display="none";
document.getElementById("codeBox").style.display="none";
document.querySelector(".container").style.display="block";
}

</script>

</body>
</html>
