<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RCM WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Outfit;
background:#ececec;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
background:white;
padding:12px;
border-bottom:4px solid black;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:20px;
font-weight:900;
}

.top-btn{
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin-left:5px;
}

.rcm{background:#2ecc71;color:white;}
.lock{background:#e74c3c;color:white;}
.clear{background:#f39c12;color:white;}

.toggle{
font-size:12px;
margin-left:10px;
}

.online{
font-size:12px;
color:green;
text-align:center;
margin-top:3px;
}

.chat-box{
background:white;
border-radius:10px;
padding:10px;
margin-top:10px;
height:420px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* OTHER USER MESSAGE */

.msg{
background:white;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:75%;
align-self:flex-start;
}

/* MY MESSAGE */

.mymsg{
background:#e8f8f5;
border:1px solid #ccc;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:75%;
align-self:flex-end;
}

.time{
font-size:11px;
margin-top:3px;
opacity:.8;
}

.status{
font-size:10px;
padding:2px 6px;
border-radius:4px;
margin-left:6px;
color:white;
}

.delivered{
background:orange;
}

.read{
background:#27ae60;
}

.input-box{
background:white;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.row{
display:flex;
gap:5px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.send{background:black;color:white;}
.login{background:black;color:white;width:100%;}

/* Loading Screen */

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
z-index:999;
}

</style>
</head>

<body>

<div class="loading" id="loading">
Opening RCM WORLD...
</div>

<div class="container">

<div id="loginPage">

<div class="header">
<div class="title">RCM WORLD</div>
</div>

<div class="input-box">

<input type="password" id="code" placeholder="Enter Code">

<button class="login" onclick="login()">Open Chat</button>

</div>

</div>

<div id="chatPage" style="display:none">

<div class="header">

<div class="title">RCM WORLD</div>

<div>

<button class="top-btn rcm" onclick="openRCM()">🌐 RCM</button>

<button class="top-btn lock" onclick="lockChat()">🔒 Lock</button>

<button class="top-btn clear" onclick="clearChat()">🧹 Delete All</button>

<label class="toggle">
Auto Delete
<input type="checkbox" id="autoDeleteToggle">
</label>

</div>

</div>

<div class="online" id="onlineCount">🟢 0 Online</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">

<div class="row">
<input type="text" id="msg" placeholder="Message">
<button class="send" onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded,
onValue,
set,
onDisconnect,
update,
remove
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyCoNO0Ykevb3whEaiwSYAkRGtjTEjJslnU",
authDomain: "dschat-18c13.firebaseapp.com",
databaseURL: "https://dschat-18c13-default-rtdb.firebaseio.com",
projectId: "dschat-18c13",
storageBucket: "dschat-18c13.appspot.com",
messagingSenderId: "846109078144",
appId: "1:846109078144:web:ab8cca30cfa40cbbab6c65"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const chatRef=ref(db,"news");

/* USER ID */

let userId=localStorage.getItem("userId");

if(!userId){

userId="u"+Math.floor(Math.random()*100000);

localStorage.setItem("userId",userId);

}

/* ONLINE USERS */

const onlineRef=ref(db,"online/"+userId);

set(onlineRef,true);

onDisconnect(onlineRef).remove();

onValue(ref(db,"online"),(snap)=>{

let count=snap.size||0;

document.getElementById("onlineCount").innerText="🟢 "+count+" Online";

});

/* LOGIN */

window.login=function(){

let code=document.getElementById("code").value;

if(code=="0911"){

document.getElementById("loginPage").style.display="none";
document.getElementById("chatPage").style.display="block";

}else{

alert("Wrong Code");

}

}

/* SEND */

window.send=function(){

let msg=document.getElementById("msg").value;

if(msg=="") return;

let newMsg=push(chatRef,{
text:msg,
user:userId,
time:Date.now(),
seen:false
});

if(document.getElementById("autoDeleteToggle").checked){

setTimeout(()=>{

remove(newMsg);

},30000);

}

document.getElementById("msg").value="";

}

/* MESSAGE LISTENER */

onChildAdded(chatRef,(data)=>{

let d=data.val();

let time=new Date(d.time).toLocaleTimeString();

let cls = (d.user==userId) ? "mymsg" : "msg";

let statusClass="delivered";
let statusText="Delivered";

if(d.seen){

statusClass="read";
statusText="Read";

}

let div=document.createElement("div");

div.className=cls;

div.innerHTML=`

${d.text}

<div class="time">

${time}

<span class="status ${statusClass}">${statusText}</span>

</div>

`;

document.getElementById("chat").appendChild(div);

update(data.ref,{seen:true});

});

/* BUTTONS */

window.openRCM=function(){

document.getElementById("loading").style.display="flex";

setTimeout(()=>{

window.location.replace("https://www.rcmworld.com");

},2000);

}

window.lockChat=function(){

document.getElementById("chatPage").style.display="none";
document.getElementById("loginPage").style.display="block";

}

window.clearChat=async function(){

if(confirm("सगळे messages delete करायचे का?")){

await remove(ref(db,"news"));

document.getElementById("chat").innerHTML="";

}

}

</script>

</body>
</html>
